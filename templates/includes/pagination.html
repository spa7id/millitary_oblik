{% if page_obj.has_other_pages %}
  <nav aria-label="Навігація по сторінках" class="mt-4">
    <ul class="pagination justify-content-center">

      <li class="page-item {% if not page_obj.has_previous %}disabled{% endif %}">
        {% if page_obj.has_previous %}
          <a class="page-link" href="{% url 'oblik:service_members_list' %}?page={{ page_obj.previous_page_number }}">
            <i class="bi bi-chevron-left"></i> Назад
          </a>
        {% else %}
          <span class="page-link">
            <i class="bi bi-chevron-left"></i> Назад
          </span>
        {% endif %}
      </li>

      <li class="page-item active">
        <span class="page-link">
          Сторінка {{ page_obj.number }} з {{ page_obj.paginator.num_pages }}
        </span>
      </li>

      <li class="page-item {% if not page_obj.has_next %}disabled{% endif %}">
        {% if page_obj.has_next %}
          <a class="page-link" href="{% url 'oblik:service_members_list' %}?page={{ page_obj.next_page_number }}">
            Далі <i class="bi bi-chevron-right"></i>
          </a>
        {% else %}
          <span class="page-link">
            Далі <i class="bi bi-chevron-right"></i>
          </span>
        {% endif %}
      </li>

    </ul>
  </nav>
{% endif %}
